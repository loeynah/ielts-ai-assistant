<script>
  // ----- 标准答案 (来自103文档) -----
  const ANSWER_KEY = {
    1: "8.50", 2: "main", 3: "partner", 4: "band", 5: "second",
    6: "top", 7: "carnival", 8: "charity", 9: "swimming", 10: "theatre"
  };
  function normalizeAnswer(str) {
    let s = String(str).trim().toLowerCase();
    if (s === "theater") s = "theatre";
    return s;
  }

  // ----- 完整听力原文 (答案高亮已嵌入) -----
  const TRANSCRIPT_HTML = `<h4>📖 听力原文 (答案高亮标记)</h4>
  <p>Hello, could I speak to Mr. John Gertelstone, please speaking. Oh, hi. My name is Julie Bloom. I'm studying here in the UK for a year and a friend told me you organize an international club where people of different nationalities can meet up.</p>
  <p>That's right. The club was founded over 50 years ago and at present we've got members from approximately 30 countries.</p>
  <p>What's the name of your friend? Louise. She's back in the States now. Oh Louise. I remember her. So are you from the States, too, Julie? Yes, from California. Great. Well, let's see what I can tell you about the club. It doesn't cost a lot to become a member. You can join for two months for two pounds 50 or it's <span class="answer-highlight">eight pounds 50</span> for 12 months. And is it only for university students?</p>
  <p>No, we're open to anyone. We have quite a few members from the language schools in town and also local people who are interested in meeting people from other countries.</p>
  <p>Okay. So what sorts of things do you do? Well, one thing we organize on a regular basis is dancing. That's a great way to get to know people. Do you mean like disco? No, we don't do disco. We do folk dances. Some from Europe, but some from further afield. Everyone really enjoys them. We meet on Monday evenings at 830. Do you know the university center? Yes, I think so. We meet there in the <span class="answer-highlight">main hall</span>. Don't get confused with the old hall, where there's a ballroom dancing group. They're nothing to do with us.</p>
  <p>And can I just show up? Sure, everyone's welcome. And do I need to come along with a <span class="answer-highlight">partner</span> for the dancing? You don't have to, though, you can if you want to. I'm sure you'll have a good time. We have live music for some sessions. I don't suppose you play a musical instrument, do you? I play the violin, but I'm not very good. Well, we're looking for some people to join the <span class="answer-highlight">band</span>. If you're interested, why don't you call Mike? His numbers 01356890674.</p>
  <p>Okay, thanks. Then we also have a meal together regularly. That's once a month, and it's always on a Sunday, the <span class="answer-highlight">second</span> one of the month. Oh, so that'll be this coming Sunday. And where's that held? In the university center again in the canteen, we used to have it in the restaurant on the ground floor, but that's closed at weekends now, unfortunately, so we're up on the <span class="answer-highlight">top</span> floor.</p>
  <p>Then we have some special summer events, too. On July the second, we're going to a place called Great Hampton about half an hour's drive away to take part in the <span class="answer-highlight">carnival</span> they hold there every year. It's always a good day out, especially if it's a sunny day. ... Well, in that case, you might be interested in our event on July the 16th. That's a walk in the standard hills. We do about 15 kilometres, so it's a decent walk and it's for <span class="answer-highlight">charity</span>.</p>
  <p>Then on August the 7th, we're having a garden party at the home of one of our organisers. She has an outdoor pool, so if the weather's warm enough, you'll be able to go <span class="answer-highlight">swimming</span>. ... Then our last summer events on September the 4th. Last year, we went to a castle, but this year we're going to the <span class="answer-highlight">theatre</span>. We do ask members to let us know in advance for that so we can book.</p>
  <p style="height: 30px;"></p>`;

  // ----- 渲染题目（包含小标题）-----
  function renderQuestions() {
    const html = `
      <div class="question-group">
        <div class="group-title">🌍 International Club</div>
        <div class="instruction">Write ONE WORD AND/OR A NUMBER for each answer.</div>
        <div class="sub-title">📌 Membership</div>
        <div class="question-item" data-qid="1"><span class="q-num">1</span><span>Membership costs 1 £</span><input type="text" class="blank-input" id="input_1" data-q="1" autocomplete="off"><span>for a year</span></div>
        
        <div class="sub-title">💃 Regular events · International folk dancing</div>
        <div class="question-item" data-qid="2"><span class="q-num">2</span><span>in the University Centre: the</span><input type="text" class="blank-input" id="input_2" data-q="2"><span>hall</span></div>
        <div class="question-item" data-qid="3"><span class="q-num">3</span><span>no need to bring a</span><input type="text" class="blank-input" id="input_3" data-q="3"><span></span></div>
        <div class="question-item" data-qid="4"><span class="q-num">4</span><span>people needed for the</span><input type="text" class="blank-input" id="input_4" data-q="4"><span>(tel. Mike)</span></div>
        
        <div class="sub-title">🍽️ Meal</div>

        <div class="question-item" data-qid="6"><span class="q-num">6</span><span>in the University Centre: the canteen on the</span><input type="text" class="blank-input" id="input_6" data-q="6"><span>floor</span></div>
        
        <div class="sub-title">☀️ Summer events</div>
        <div class="question-item" data-qid="7"><span class="q-num">7</span><span>July 2: Great Hampton</span><input type="text" class="blank-input" id="input_7" data-q="7"><span></span></div>
        <div class="question-item" data-qid="8"><span class="q-num">8</span><span>July 16: 15 km walk for a</span><input type="text" class="blank-input" id="input_8" data-q="8"><span>(in Stannard Hills)</span></div>
        <div class="question-item" data-qid="9"><span class="q-num">9</span><span>Aug 7: garden party - could go</span><input type="text" class="blank-input" id="input_9" data-q="9"><span>outdoors if weather allows</span></div>
        <div class="question-item" data-qid="10"><span class="q-num">10</span><span>Sept 4: trip to the</span><input type="text" class="blank-input" id="input_10" data-q="10"><span></span></div>
      </div>

    `;

  function buildNav() {
    const navDiv = document.getElementById('qNav');
    navDiv.innerHTML = '';
    for (let i=1; i<=10; i++) {
      const btn = document.createElement('div');
      btn.className = 'q-nav-item';
      btn.textContent = i;
      btn.dataset.q = i;
      btn.addEventListener('click', () => {
        document.getElementById(`input_${i}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
      navDiv.appendChild(btn);
    }
  }

  function updateNavStyle() {
    for (let i=1; i<=10; i++) {
      const inp = document.getElementById(`input_${i}`);
      const nav = document.querySelector(`.q-nav-item[data-q="${i}"]`);
      if (nav && inp) nav.classList.toggle('answered', inp.value.trim() !== '');
    }
  }

  function getUserAnswers() {
    const ans = {};
    for (let i=1;i<=10;i++) ans[i] = document.getElementById(`input_${i}`)?.value.trim() || '';
    return ans;
  }

  function gradeAnswers() {
    const user = getUserAnswers();
    const results = {};
    for (let i=1;i<=10;i++) results[i] = normalizeAnswer(user[i]) === normalizeAnswer(ANSWER_KEY[i]);
    return results;
  }

  function markNavCorrectness() {
    const results = gradeAnswers();
    for (let i=1;i<=10;i++) {
      const nav = document.querySelector(`.q-nav-item[data-q="${i}"]`);
      if (nav) {
        nav.classList.remove('correct', 'incorrect');
        nav.classList.add(results[i] ? 'correct' : 'incorrect');
      }
    }
  }

  function generateReviewTable() {
    const container = document.getElementById('reviewTablesContainer');
    if (!container) return;
    const results = gradeAnswers();
    const user = getUserAnswers();
    let html = `<div class="review-table-wrapper"><h4>📊 答案回顾</h4><table class="results-table"><thead><tr><th>题号</th><th>你的答案</th><th>正确答案</th><th>结果</th></tr></thead><tbody>`;
    for (let i=1;i<=10;i++) {
      const u = user[i] || '—';
      const c = ANSWER_KEY[i];
      const ok = results[i];
      html += `<tr><td>${i}</td><td>${escapeHtml(u)}</td><td>${c}</td><td class="${ok ? 'correct-tag' : 'incorrect-tag'}">${ok ? '✔ 正确' : '✘ 错误'}</td></tr>`;
    }
    html += `</tbody></table></div>`;
    container.innerHTML = html;
  }

  function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

  // 复习模式切换
  let isReviewMode = false;
  let timerSeconds = 0;
  let timerInterval = null;
  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timerSeconds++;
      const mins = Math.floor(timerSeconds/60);
      const secs = timerSeconds%60;
      document.getElementById('timerDisplay').innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    }, 1000);
  }
  function stopTimer() { if(timerInterval) clearInterval(timerInterval); timerInterval=null; }

  function toggleFinishMode() {
    if (isReviewMode) {
      isReviewMode = false;
      document.getElementById('finishBtn').innerText = 'Finish';
      document.getElementById('splitLayout').classList.remove('split-view');
      document.querySelectorAll('.blank-input').forEach(inp => inp.disabled = false);
      document.getElementById('reviewTablesContainer').innerHTML = '';
      for(let i=1;i<=10;i++) {
        const nav = document.querySelector(`.q-nav-item[data-q="${i}"]`);
        if(nav) nav.classList.remove('correct', 'incorrect');
      }
      updateNavStyle();
      startTimer();
    } else {
      isReviewMode = true;
      document.getElementById('finishBtn').innerText = 'Return to Test';
      document.getElementById('splitLayout').classList.add('split-view');
      document.querySelectorAll('.blank-input').forEach(inp => inp.disabled = true);
      generateReviewTable();
      markNavCorrectness();
      stopTimer();
      if (!document.getElementById('transcriptFull').innerHTML.includes('听力原文')) {
        document.getElementById('transcriptFull').innerHTML = TRANSCRIPT_HTML;
      }
    }
  }

  function saveAll() {
    const answers = getUserAnswers();
    const testHTML = document.getElementById('testContainer').innerHTML;
    const notesHTML = document.getElementById('notesList').innerHTML;
    const data = { answers, timer: timerSeconds, testHTML, notesHTML, fontSize: document.documentElement.className, darkMode: document.body.classList.contains('dark') };
    localStorage.setItem('ielts_listening_club', JSON.stringify(data));
    const toast = document.getElementById('toastMsg');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
  }
  function loadProgress() {
    const raw = localStorage.getItem('ielts_listening_club');
    if (!raw) return;
    try {
      const data = JSON.parse(raw);
      if (data.testHTML) document.getElementById('testContainer').innerHTML = data.testHTML;
      if (data.notesHTML) document.getElementById('notesList').innerHTML = data.notesHTML;
      if (data.timer) { timerSeconds = data.timer; updateTimerDisplay(); }
      if (data.fontSize) document.documentElement.className = data.fontSize;
      if (data.darkMode) document.body.classList.add('dark');
      if (data.answers) {
        for (let i=1;i<=10;i++) {
          const inp = document.getElementById(`input_${i}`);
          if (inp && data.answers[i] !== undefined) inp.value = data.answers[i];
        }
      }
      updateNavStyle();
    } catch(e) {}
  }
  function updateTimerDisplay() {
    const mins = Math.floor(timerSeconds/60), secs = timerSeconds%60;
    document.getElementById('timerDisplay').innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
  }
  function clearAll() {
    if (confirm('清除所有进度（答案、高亮、笔记）？')) {
      localStorage.removeItem('ielts_listening_club');
      location.reload();
    }
  }

  // 音频播放器
  function initAudio() {
    const audioHTML = `<button class="play-pause-btn" id="playBtn">▶</button>
    <div class="progress-container" id="progressArea"><div class="progress-bar-wrap"><div class="progress-fill" id="progressFill"></div></div></div>
    <div class="time-display" id="audioTime">00:00 / 00:00</div>
    <select class="speed-select" id="speedSelect"><option value="0.7">0.7x</option><option value="1.0" selected>1.0x</option><option value="1.1">1.1x</option><option value="1.2">1.2x</option><option value="1.5">1.5x</option></select>
    <audio id="audioPlayer" src="audio.mp3" preload="metadata"></audio>`;
    document.getElementById('audioPlayerArea').innerHTML = audioHTML;
    const audio = document.getElementById('audioPlayer');
    const playBtn = document.getElementById('playBtn');
    const fill = document.getElementById('progressFill');
    const timeSpan = document.getElementById('audioTime');
    const speed = document.getElementById('speedSelect');
    audio.addEventListener('loadedmetadata', () => timeSpan.innerText = `00:00 / ${formatTime(audio.duration)}`);
    playBtn.onclick = () => audio.paused ? audio.play() : audio.pause();
    audio.onplay = () => playBtn.innerText = '⏸';
    audio.onpause = () => playBtn.innerText = '▶';
    audio.ontimeupdate = () => { if(audio.duration) fill.style.width = (audio.currentTime/audio.duration)*100+'%'; timeSpan.innerText = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`; };
    speed.onchange = () => audio.playbackRate = parseFloat(speed.value);
    document.getElementById('progressArea').onclick = (e) => { const rect = e.currentTarget.getBoundingClientRect(); const percent = (e.clientX - rect.left)/rect.width; audio.currentTime = percent * audio.duration; };
    function formatTime(t) { if(isNaN(t)) return '00:00'; let m=Math.floor(t/60), s=Math.floor(t%60); return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
  }

  // ----- 高亮逻辑：第一次棕色，同一处第二次变玫红 -----
  let currentRange = null;
  let activeHighlightSpan = null;   // 用于存储点击的高亮span

  function handleSelection() {
    const sel = window.getSelection();
    if (sel.isCollapsed || sel.toString().trim() === '') {
      document.getElementById('selectionToolbar').hidden = true;
      activeHighlightSpan = null;
      return;
    }
    currentRange = sel.getRangeAt(0);
    activeHighlightSpan = null;
    const rect = currentRange.getBoundingClientRect();
    const bar = document.getElementById('selectionToolbar');
    bar.hidden = false;
    bar.style.left = `${window.scrollX + rect.left + rect.width/2 - 80}px`;
    bar.style.top = `${window.scrollY + rect.top - 45}px`;
  }

  // 当点击已经高亮的span时，弹出工具条，并记录该span
  function onSpanClick(e) {
    let target = e.target;
    while (target && target !== document.body) {
      if (target.classList && (target.classList.contains('hl-brown') || target.classList.contains('hl-rose') || target.classList.contains('hl-blue'))) {
        activeHighlightSpan = target;
        const rect = target.getBoundingClientRect();
        const bar = document.getElementById('selectionToolbar');
        bar.hidden = false;
        bar.style.left = `${window.scrollX + rect.left + rect.width/2 - 80}px`;
        bar.style.top = `${window.scrollY + rect.top - 45}px`;
        e.stopPropagation();
        return;
      }
      target = target.parentNode;
    }
  }

  // 执行高亮：如果当前选区在已有的高亮span上则升级；否则创建棕色
  function applyHighlightToRange() {
    if (!currentRange) return null;
    // 检查选区内是否完全包含在一个高亮span中
    let container = currentRange.commonAncestorContainer;
    if (container.nodeType === 3) container = container.parentElement;
    const existingHighlight = container.closest?.('.hl-brown, .hl-rose');
    if (existingHighlight && existingHighlight.classList.contains('hl-brown')) {
      // 升级为玫红
      existingHighlight.classList.remove('hl-brown');
      existingHighlight.classList.add('hl-rose');
      window.getSelection().removeAllRanges();
      return existingHighlight;
    } else if (existingHighlight && existingHighlight.classList.contains('hl-rose')) {
      // 已经是玫红，不变
      window.getSelection().removeAllRanges();
      return existingHighlight;
    } else {
      // 新创建棕色高亮
      const span = document.createElement('span');
      span.className = 'hl-brown';
      try {
        currentRange.surroundContents(span);
      } catch(e) {
        const contents = currentRange.extractContents();
        span.appendChild(contents);
        currentRange.insertNode(span);
      }
      window.getSelection().removeAllRanges();
      return span;
    }
  }

  // 清除当前活动的高亮span（如果activeHighlightSpan存在）
  function clearHighlightSpan() {
    if (activeHighlightSpan && activeHighlightSpan.parentNode) {
      const parent = activeHighlightSpan.parentNode;
      while (activeHighlightSpan.firstChild) parent.insertBefore(activeHighlightSpan.firstChild, activeHighlightSpan);
      parent.removeChild(activeHighlightSpan);
      parent.normalize();
      activeHighlightSpan = null;
    } else if (currentRange) {
      // 如果当前选区内有高亮，尝试清除整个高亮标签
      const parent = currentRange.commonAncestorContainer.parentElement;
      const spans = parent?.querySelectorAll('.hl-brown, .hl-rose, .hl-blue') || [];
      spans.forEach(sp => { if(sp.parentNode) sp.outerHTML = sp.innerText; });
    }
    window.getSelection().removeAllRanges();
  }

  function createNoteFromSpan(span) {
    if (!span) return;
    const text = span.innerText.slice(0, 100);
    const id = 'n'+Date.now()+Math.random();
    span.dataset.noteId = id;
    const card = document.createElement('div');
    card.className = 'note-card';
    card.dataset.noteId = id;
    card.innerHTML = `<div class="note-quote">${escapeHtml(text)}</div><textarea placeholder="Write note here..."></textarea><button class="del-note-btn">Delete</button>`;
    card.querySelector('.del-note-btn').onclick = () => {
      if(span && span.parentNode) span.outerHTML = span.innerText;
      card.remove();
    };
    document.getElementById('notesList').prepend(card);
    document.body.classList.add('notes-open');
  }

  function handleToolbarAction(e) {
    const act = e.target.dataset.action;
    if (!act) return;
    if (act === 'hl') {
      if (activeHighlightSpan) {
        if (activeHighlightSpan.classList.contains('hl-brown')) {
          activeHighlightSpan.classList.remove('hl-brown');
          activeHighlightSpan.classList.add('hl-rose');
        } else if (activeHighlightSpan.classList.contains('hl-rose')) {
          // 已经是玫红，不处理
        } else {
          activeHighlightSpan.classList.add('hl-brown');
        }
        window.getSelection().removeAllRanges();
      } else if (currentRange && !currentRange.collapsed) {
        applyHighlightToRange();
      }
    } else if (act === 'note') {
      if (activeHighlightSpan) {
        if (!activeHighlightSpan.classList.contains('hl-blue')) {
          activeHighlightSpan.classList.remove('hl-brown', 'hl-rose');
          activeHighlightSpan.classList.add('hl-blue');
        }
        createNoteFromSpan(activeHighlightSpan);
      } else if (currentRange && !currentRange.collapsed) {
        const newSpan = applyHighlightToRange();
        if (newSpan) {
          newSpan.classList.remove('hl-brown', 'hl-rose');
          newSpan.classList.add('hl-blue');
          createNoteFromSpan(newSpan);
        } else {
          // fallback: 直接wrap蓝色
          const span = document.createElement('span');
          span.className = 'hl-blue';
          try { currentRange.surroundContents(span); createNoteFromSpan(span); } catch(e) {}
        }
      }
    } else if (act === 'clearHL') {
      clearHighlightSpan();
    }
    document.getElementById('selectionToolbar').hidden = true;
    activeHighlightSpan = null;
    currentRange = null;
  }

  function bindEvents() {
    document.getElementById('saveBtn').onclick = saveAll;
    document.getElementById('clearBtn').onclick = clearAll;
    document.getElementById('finishBtn').onclick = toggleFinishMode;
    document.getElementById('notesBtn').onclick = () => document.body.classList.toggle('notes-open');
    document.getElementById('closeNotes').onclick = () => document.body.classList.remove('notes-open');
    document.getElementById('transcriptBtn').onclick = () => {
      document.getElementById('splitLayout').classList.toggle('split-view');
      document.getElementById('transcriptFull').innerHTML = TRANSCRIPT_HTML;
    };
    document.getElementById('settingsBtn').onclick = () => {
      const p = document.getElementById('settingsPanel');
      const o = document.getElementById('overlay');
      const vis = p.style.display === 'block';
      p.style.display = vis ? 'none' : 'block';
      o.style.display = vis ? 'none' : 'block';
    };
    document.querySelectorAll('.settings-option[data-size]').forEach(btn => btn.addEventListener('click',()=>{ document.documentElement.className = `font-${btn.dataset.size}`; saveAll(); }));
    document.querySelectorAll('.settings-option[data-mode]').forEach(btn => btn.addEventListener('click',()=>{ document.body.classList.toggle('dark', btn.dataset.mode === 'dark'); saveAll(); }));
    document.getElementById('overlay').onclick = () => { document.getElementById('settingsPanel').style.display='none'; document.getElementById('overlay').style.display='none'; };
    document.getElementById('testContainer').addEventListener('input', (e) => { if(e.target.classList.contains('blank-input')) updateNavStyle(); });
    // 监听高亮span点击（事件委托）
    document.getElementById('testContainer').addEventListener('click', onSpanClick);
    document.addEventListener('mouseup', (e) => {
      if (!e.target.closest('#selectionToolbar')) {
        setTimeout(() => {
          if (!activeHighlightSpan) handleSelection();
        }, 10);
      }
    });
    document.getElementById('selectionToolbar')?.addEventListener('click', handleToolbarAction);
  }

  function initSplitter() {
    const splitter = document.getElementById('splitter');
    let drag = false;
    splitter.addEventListener('mousedown', () => { drag=true; document.body.style.cursor='col-resize'; });
    window.addEventListener('mouseup', () => { drag=false; document.body.style.cursor=''; });
    window.addEventListener('mousemove', (e) => {
      if(!drag) return;
      const layout = document.getElementById('splitLayout');
      const left = document.getElementById('leftPane');
      const right = document.getElementById('rightPane');
      const total = layout.offsetWidth;
      let newLeft = e.clientX;
      if(newLeft<200) newLeft=200;
      if(newLeft>total-250) newLeft=total-250;
      left.style.flexBasis = `${newLeft}px`;
      right.style.flexBasis = `${total - newLeft - splitter.offsetWidth}px`;
    });
  }

  function init() {
    renderQuestions();
    buildNav();
    initAudio();
    bindEvents();
    initSplitter();
    loadProgress();
    startTimer();
    updateNavStyle();
  }
  init();
</script>
</body>
</html>
